
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS 剩余价值计算器</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 微调输入框焦点阴影，使其更符合极简美学 */
        .focus-ring:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8">
        <!-- 头部 -->
        <div class="mb-6">
            <h1 class="text-xl font-semibold text-slate-900 tracking-tight">VPS 剩余价值计算器</h1>
            <p class="text-xs text-slate-400 mt-1" id="current-date-tip">今天: ----年--月--日</p>
        </div>

        <hr class="border-slate-100 mb-6">

        <!-- 输入表单 -->
        <div class="space-y-4">
            <!-- 账单周期范围 -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1">上次账单日</label>
                    <input type="date" id="start-date" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus-ring" placeholder="开始日期">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1">下次续费日</label>
                    <input type="date" id="end-date" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus-ring" placeholder="结束日期">
                </div>
            </div>

            <!-- 续费金额 -->
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">续费金额 (原币种)</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-sm text-slate-400">$</span>
                    <input type="number" id="price" step="0.01" min="0" class="w-full pl-7 pr-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus-ring" placeholder="0.00">
                </div>
            </div>

            <!-- 当日汇率 -->
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">当日汇率 (外币对本币，非折算填 1)</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-sm text-slate-400">¥</span>
                    <input type="number" id="rate" step="0.0001" min="0" value="7.25" class="w-full pl-7 pr-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus-ring" placeholder="如：7.25">
                </div>
            </div>
        </div>

        <!-- 实时计算结果区 -->
        <div class="mt-8 p-4 bg-blue-50/50 border border-blue-100/50 rounded-xl space-y-3">
            <div class="flex justify-between text-xs text-slate-500">
                <span>周期总天数 / 剩余天数</span>
                <span id="days-info" class="font-medium text-slate-700">-- 天 / -- 天</span>
            </div>
            
            <div class="flex justify-between items-center">
                <span class="text-xs text-slate-500">剩余价值 (原币)</span>
                <span id="result-raw" class="text-lg font-semibold text-slate-800">$ 0.00</span>
            </div>

            <hr class="border-blue-100/30">

            <div class="flex justify-between items-center">
                <span class="text-sm font-medium text-blue-900">折合本币价值</span>
                <span id="result-local" class="text-2xl font-bold text-blue-600">¥ 0.00</span>
            </div>
        </div>

        <div class="mt-4 text-center">
            <p class="text-[10px] text-slate-300">算法：剩余价值 = 续费金额 × (今日至续费日天数 / 周期总天数)</p>
        </div>
    </div>

    <!-- 交互脚本 -->
    <script>
        // 获取页面元素
        const startDateInput = document.getElementById('start-date');
        const endDateInput = document.getElementById('end-date');
        const priceInput = document.getElementById('price');
        const rateInput = document.getElementById('rate');

        const dateTip = document.getElementById('current-date-tip');
        const daysInfo = document.getElementById('days-info');
        const resultRaw = document.getElementById('result-raw');
        const resultLocal = document.getElementById('result-local');

        // 设置今天日期提示
        const today = new Date();
        today.setHours(0, 0, 0, 0); // 清除时分秒
        
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        dateTip.textContent = `今天: ${yyyy}年${mm}月${dd}日`;

        // 计算逻辑
        function calculate() {
            const startVal = startDateInput.value;
            const endVal = endDateInput.value;
            const price = parseFloat(priceInput.value);
            const rate = parseFloat(rateInput.value) || 1;

            // 基础校验：确保日期和价格都输入了
            if (!startVal || !endVal || isNaN(price) || price <= 0) {
                resetResults();
                return;
            }

            const startDate = new Date(startVal);
            const endDate = new Date(endVal);

            // 清除时间影响，只计算日期
            startDate.setHours(0,0,0,0);
            endDate.setHours(0,0,0,0);

            // 1. 计算账单周期总天数 (包含当天，所以 +1)
            const totalTime = endDate.getTime() - startDate.getTime();
            const totalDays = Math.ceil(totalTime / (1000 * 60 * 60 * 24));

            // 2. 计算剩余天数 (今天 到 续费日)
            const remainingTime = endDate.getTime() - today.getTime();
            let remainingDays = Math.ceil(remainingTime / (1000 * 60 * 60 * 24));

            // 边界处理
            if (totalDays <= 0) {
                daysInfo.textContent = "上次账单日需早于下次续费日";
                resetResults();
                return;
            }

            // 如果今天还没到账单开始日
            if (today < startDate) {
                remainingDays = totalDays;
            }
            // 如果已经过期了
            if (remainingDays < 0) {
                remainingDays = 0;
            }

            // 3. 计算剩余价值
            const proRataRatio = remainingDays / totalDays;
            const rawValue = price * proRataRatio;
            const localValue = rawValue * rate;

            // 4. 更新 UI
            daysInfo.textContent = `${totalDays} 天 / ${remainingDays} 天`;
            resultRaw.textContent = `$ ${rawValue.toFixed(2)}`;
            resultLocal.textContent = `¥ ${localValue.toFixed(2)}`;
        }

        function resetResults() {
            daysInfo.textContent = "-- 天 / -- 天";
            resultRaw.textContent = "$ 0.00";
            resultLocal.textContent = "¥ 0.00";
        }

        // 绑定输入事件，实现无感实时计算
        [startDateInput, endDateInput, priceInput, rateInput].forEach(input => {
            input.addEventListener('input', calculate);
        });
    </script>
</body>
</html>
